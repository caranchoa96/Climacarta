name: Compilar EXE de Windows con GraalVM

# ¿Cuándo se ejecuta esto? 
# Cada vez que hagas un 'git push' o manualmente desde la web.
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    # ¡Aquí le pedimos prestada a GitHub una máquina con Windows!
    runs-on: windows-latest 

    steps:
      # 1. Descarga tu código (el jar y la carpeta de config) en la máquina virtual
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # 2. Instala GraalVM mágicamente en segundos
      - name: Configurar GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
     # 3. Inyectar la API Key secreta (ajusta la ruta de tu archivo Java)
      - name: Inyectar API Key secreta
        run: |
          (Get-Content src/Modelo.java) -replace "Las peliblancas son lindas", '${{ secrets.CLIMA_API_KEY }}' | Set-Content src/Modelo.java

      # 4. Compilar el proyecto automáticamente con Ant
      - name: Compilar proyecto a JAR
        run: ant jar "-Dplatforms.JDK_26__System_.home=$env:JAVA_HOME"

      # 3. Sacar el JAR de la carpeta 'dist', moverlo a la raíz y renombrarlo a clima.jar
      - name: Preparar JAR para GraalVM
        run: |
          Move-Item "dist\*.jar" -Destination "clima.jar"
      # 5. Compilar el ejecutable

      - name: Compilar JAR a EXE nativo
        run: |
          native-image -cp "clima.jar;lib\*" ponce9.WeatherAppUI -H:ConfigurationFileDirectories=configuracion -H:IncludeLocales=es -H:NativeLinkerOption=/SUBSYSTEM:WINDOWS -H:NativeLinkerOption=/ENTRY:mainCRTStartup --no-fallback -o clima

      # 6. Inyectar el ícono directamente en el .exe (usando el archivo en la raíz)
      - name: Poner ícono al ejecutable
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile "rcedit.exe"
          .\rcedit.exe clima.exe --set-icon app.ico

      # 7. Organizar carpeta LIB (Fuentes + Ícono)
      - name: Preparar carpeta lib
        run: |
          New-Item -ItemType Directory -Force -Path lib
          # Copiamos las fuentes
          Copy-Item "$env:JAVA_HOME\lib\fontconfig.*" -Destination lib\
          # Movemos el ícono a lib para esconderlo en el instalador
          Move-Item "app.ico" -Destination lib\

      # 8. Empaquetar todo con Inno Setup
      - name: Crear Instalador
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" instalador.iss

      # 9. Entregar el instalador final
      - name: Subir Instalador
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-ClimaApp
          path: Output/Instalador_ClimaApp.exe

      - name: Crear Release y Subir Instalable
        uses: softprops/action-gh-release@v2
        with:
        # ¡OJO AQUÍ! Cambia "WeatherApp" por el nombre exacto que le da Maven a tu .exe, nya
          files: Output/Instalador_ClimaApp.exe 
          generate_release_notes: true # Esto crea notas de parche automáticas súper bonitas, nya
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
